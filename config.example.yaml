# khonliang-developer config — example template
#
# Copy this file to config.yaml and edit the paths for your environment.
# The actual config.yaml is git-ignored because it contains absolute,
# machine-specific paths. Only this example template is committed.
#
# All path fields below are resolved against this file's directory at
# load time by `developer.config.Config.load`. Architectural isolation:
# `db_path` MUST point at developer's own SQLite file. The pipeline
# refuses to start if any store opens a different DB.

db_path: data/developer.db
workspace_root: /path/to/dev
prompts_dir: prompts

# Projects developer manages. Each entry needs an absolute `repo` path
# and an optional `specs_dir` (relative to the repo, defaults to "specs").
# Edit these to match your local checkout layout.
projects:
  developer:
    repo: /path/to/khonliang-developer
    specs_dir: specs
  researcher:
    repo: /path/to/khonliang-researcher
    specs_dir: specs
  researcher-lib:
    repo: /path/to/khonliang-researcher-lib
    specs_dir: specs

# ---------------------------------------------------------------------------
# Runtime integration blocks
# ---------------------------------------------------------------------------

# Model assignments used by evaluation/review workflows. Empty strings are
# allowed for local development, but the keys must be present.
models:
  summarizer: ""
  extractor: ""
  assessor: ""
  idea_parser: ""
  embedder: ""
  reviewer: ""

# Bus endpoint used by the native developer agent and by researcher evidence
# lookups. The native agent takes its bus URL from the launch command; this
# flag remains false in the example so direct MCP-only compatibility launches
# keep their historical default.
bus:
  url: http://localhost:8787
  enabled: false

# Compatibility block for legacy direct researcher MCP configuration. The
# primary developer runtime uses bus.url for researcher evidence/context calls;
# this block is retained in the example for schema/config compatibility only
# and is not currently used by that runtime path.
researcher_mcp:
  transport: stdio
  command: /path/to/khonliang-researcher/.venv/bin/python
  args:
    - "-m"
    - "researcher.server"
    - "--config"
    - "/path/to/khonliang-researcher/config.yaml"
  url: ""
  timeout: 30
